<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Service</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html, body{
    width:100%;
    height:100%;
}

/* NAVBAR */
.navbar{
    height:10vh;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 3vw;
    background:#f5f7fa;
}

.navbar__logo{
    font-size:1.5rem;
    font-weight:bold;
    color:#1e90ff;
}

.navbar__menu{
    display:flex;
    list-style:none;
    gap:2vw;
}

.navbar__item{
    text-decoration:none;
    color:#333;
    font-size:1rem;
}

.navbar__item:hover{
    color:#1e90ff;
}

.navbar__user{
    background:#d9ecff;
    padding:8px 15px;
    border-radius:10px;
    font-size:0.9rem;
}

/* HERO */
.hero{
    height:90vh; /* FULL SCREEN (NO SCROLL) */
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 3vw;
}

/* LEFT */
.hero__left{
    width:50%;
}

.hero__title{
    font-size:3rem;
    margin-bottom:2vh;
    color:#333;
}

.hero__title span{
    color:#1e90ff;
}

.hero__desc{
    font-size:1.1rem;
    margin-bottom:3vh;
    color:#666;
    line-height:1.6;
}

.hero__btn{
    padding:12px 25px;
    font-size:1rem;
    border:none;
    border-radius:8px;
    background:#1e90ff;
    color:#fff;
    cursor:pointer;
}

.hero__btn:hover{
    background:#187bcd;
}

/* RIGHT */
.hero__right{
    width:45%;
    height:100%;
}

.hero__right img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* RESPONSIVE */
@media (max-width:768px){
    .hero{
        flex-direction:column;
        text-align:center;
        justify-content:center;
    }

    .hero__left,
    .hero__right{
        width:100%;
    }

    .hero__title{
        font-size:2rem;
    }

    .navbar__menu{
        display:none;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar__logo">LaundryX</div>

    <ul class="navbar__menu">
        <li><a class="navbar__item" href="#">Home</a></li>
        <li><a class="navbar__item" href="#">Services</a></li>
        <li><a class="navbar__item" href="#">About Us</a></li>
        <li><a class="navbar__item" href="#">Contact Us</a></li>
    </ul>

    <div class="navbar__user">Hi, User</div>
</nav>

<!-- HERO -->
<section class="hero">

    <div class="hero__left">
        <h1 class="hero__title">
            Revitalize Your Clothes with Expert 
            <span>Laundry Services!</span>
        </h1>

        <p class="hero__desc">
            From premium dry cleaning to swift wash and fold, we deliver care and convenience. 
            Schedule a pickup and rediscover the freshness of your clothes today!
        </p>

        <button class="hero__btn">Book a Service Today</button>
    </div>

    <div class="hero__right">
        <img src="ChatGPT Image Feb 21, 2026, 10_26_16 PM.png" alt="Laundry">
    </div>

</section>

</body>
</html>
