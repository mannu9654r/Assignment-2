<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Laundry Service</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            height: 100vh;
            overflow: hidden; /* prevents scroll */
        }

        /* ===== NAVBAR ===== */
        nav{
            width: 100%;
            height: 10vh;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5vw;
            background: #f5f7fa;
        }

        .logo{
            font-size: 1.5rem;
            font-weight: bold;
        }

        .nav-links{
            display: flex;
            gap: 2vw;
            list-style: none;
        }

        .nav-links a{
            text-decoration: none;
            color: #333;
            font-size: 1rem;
        }

        .username{
            background-color: #d9ecff;
            padding: 8px 15px;
            border-radius: 10px;
            font-size: 0.9rem;
        }

        /* ===== HERO SECTION ===== */
        .hero{
            height: 90vh; /* remaining screen height */
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            background-color: #ffffff;
        }

        .hero-left{
            width: 50%;
        }

        .hero-left h1{
            font-size: 3rem;
            margin-bottom: 2vh;
            color: #333;
        }

        .hero-left span{
            color: #1e90ff;
        }

        .hero-left p{
            font-size: 1.1rem;
            margin-bottom: 3vh;
            color: #666;
            line-height: 1.6;
        }

        .hero-left button{
            padding: 12px 25px;
            font-size: 1rem;
            border: none;
            border-radius: 10px;
            background-color: #1e90ff;
            color: white;
            cursor: pointer;
        }

        .hero-left button:hover{
            background-color: #187bcd;
        }

        .hero-right{
            width: 45%;
            display: flex;
            justify-content: center;
        }

        .hero-right img{
            width: 80%;
            max-height: 80vh;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav>
        <div class="logo">Logo</div>

        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>

        <div class="username">Username</div>
    </nav>

    <!-- HERO SECTION -->
    <section class="hero">
        <div class="hero-left">
            <h1>
                Revitalize Your Clothes with Expert 
                <span>Laundry Services!</span>
            </h1>
            <p>
                From premium dry cleaning to swift wash and fold, we deliver care and convenience. 
                Schedule a pickup and rediscover the freshness of your clothes today!
            </p>
            <button>Book a Service Today</button>
        </div>

        <div class="hero-right">
            <!-- You can replace this with any laundry image link -->
            <img src="ChatGPT Image Feb 21, 2026, 10_26_16 PM.png" alt="Laundry Image">
        </div>
    </section>

</body>
</html>
