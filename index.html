<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Service</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }

        .navbar {
            height: 10vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 3vw;
            background: #eef3f7;
        }

        .navbar-logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .navbar-menu {
            display: flex;
            list-style: none;
            gap: 2vw;
        }

        .navbar-menu a {
            text-decoration: none;
            color: #6c7a89;
            font-size: 0.95rem;
        }

        .navbar-menu a:hover {
            color: #1e90ff;
        }

        .navbar-user {
            background: #dbeeff;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #1e90ff;
        }

        .hero {
            height: 90vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3vw;
        }

        .hero-left {
            width: 50%;
        }

        .hero-title {
            font-size: 3rem;
            color: #2c3e50;
            line-height: 1.2;
            margin-bottom: 2vh;
        }

        .hero-title span {
            color: #1e90ff;
        }

        .hero-desc {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 3vh;
            line-height: 1.6;
        }

        .hero-btn {
            background: #2da9e9;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
        }

        .hero-btn:hover {
            background: #1c8ed0;
        }

        .hero-right {
            width: 45%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-right img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* MOBILE */
        @media (max-width:768px) {
            .hero {
                flex-direction: column;
                justify-content: center;
                text-align: center;
            }

            .hero-left,
            .hero-right {
                width: 100%;
            }

            .hero-title {
                font-size: 2rem;
            }

            .navbar-menu {
                display: none;
            }
        }
    </style>

</head>

<body>
    <nav class="navbar">
        <div class="navbar-logo">Logo</div>
        <ul class="navbar-menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>
        <div class="navbar-user">Username</div>
    </nav>
    <section class="hero">
        <div class="hero-left">
            <h1 class="hero-title">
                Revitalize Your<br>
                Clothes with Expert<br>
                <span>Laundry Services!</span>
            </h1>
            <p class="hero-desc">
                From premium dry cleaning to swift wash and fold, we deliver care and convenience.
                Schedule a pickup and rediscover the freshness of your clothes today!
            </p>
            <button class="hero-btn">Book a service today!</button>
        </div>
        <div class="hero-right">
            <img src="image.png" alt="Laundry">
        </div>
    </section>
</body>

</html>
