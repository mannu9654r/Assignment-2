<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Laundry</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html,
        body {
            overflow-y: hidden;
            font-family: sans-serif;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
        }

        .logo {
            font-size: 26px;
            font-weight: 900;
            color: #0975c7;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .nav-links {
            display: flex;
            gap: 20px;
        }

        .nav-links a {
            color: #666;
            text-decoration: none;
            font-size: 14px;
        }

        .nav-links a:hover {
            color: #00aaff;
        }

        .user-btn {
            background: #eaf7ff;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            color: #00aaff;
            cursor: pointer;
        }

        .hero-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 80px 60px;
        }

        .hero-text {
            max-width: 500px;
        }

        .hero-text h1 {
            font-size: 42px;
            line-height: 1.3;
            color: #4a5a68;
        }

        .hero-text h1 span {
            color: #00aaff;
        }

        .hero-text p {
            margin: 20px 0;
            color: #9aa5ad;
            line-height: 1.6;
            font-size: 14px;
        }

        .hero-btn {
            background: #00aaff;
            color: white;
            border: none;
            padding: 14px 26px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 14px;
        }

        .hero-image img {
            width: 350px;
        }

        .nav {
            list-style-type: none;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #3399ff;
            text-align: center;
        }

        .item {
            float: left;
            display: inline;
        }

        .item a {
            display: inline-block;
            color: white;
            text-align: center;
            padding: 14px 16px;
        }

        .item a:hover {
            background-color: #a300cc;
            color: white;
        }

        ul {
            list-style: none;
            margin: 0;
            padding: 0;
        }
    </style>
</head>

<body>
    <header class="navbar">
        <div class="logo">Fresh Fold</div>
        <nav class="navbar">
            <ul class="nav-links">
                <li><a href="#">Home</a></li>
                <li><a href="#">About Us</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact Us</a></li>
            </ul>
        </nav>
        <button class="user-btn">Username</button>
    </header>
    <section class="hero-container">
        <div class="hero-text">
            <h1>
                Revitalize your<br>
                clothes with Expert<br>
                <span>Laundry Services!</span>
            </h1>

            <p>From premium dry cleaning to swift wash and fold,
                we deliver care and convenience. Schedule a pickup and
                rediscover the freshness of your clothes today!</p>
            <button class="hero-btn">Book a service today!</button>
        </div>

        <div class="hero-image">
            <img src="https://media-ik.croma.com/prod/https://media.tatacroma.com/Croma%20Assets/Large%20Appliances/Washers%20and%20Dryers/Images/308169_nhjiel.png"
                alt="Laundry Image">
        </div>
    </section>
</body>

</html>
