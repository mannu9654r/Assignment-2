<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laundry Service</title>

<style>
/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

html,body{
    width:100%;
    height:100%;
}

/* NAVBAR */
.navbar{
    height:10vh;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 3vw;
    background:#eef3f7;
}

/* LOGO FIXED */
.navbar__logo{
    font-size:1.6rem;
    font-weight:700;
    color:#2c3e50;
}

/* MENU */
.navbar__menu{
    display:flex;
    list-style:none;
    gap:2vw;
}

.navbar__menu a{
    text-decoration:none;
    color:#6c7a89;
    font-size:0.95rem;
}

.navbar__menu a:hover{
    color:#1e90ff;
}

/* USER */
.navbar__user{
    background:#dbeeff;
    padding:8px 16px;
    border-radius:12px;
    font-size:0.9rem;
    color:#1e90ff;
}

/* HERO */
.hero{
    height:90vh; /* FULL SCREEN */
    width:100%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 3vw;
}

/* LEFT */
.hero__left{
    width:50%;
}

.hero__title{
    font-size:3rem;
    color:#2c3e50;
    line-height:1.2;
    margin-bottom:2vh;
}

.hero__title span{
    color:#1e90ff;
}

.hero__desc{
    font-size:1rem;
    color:#7f8c8d;
    margin-bottom:3vh;
    line-height:1.6;
}

/* BUTTON */
.hero__btn{
    background:#2da9e9;
    color:white;
    padding:14px 28px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    font-size:1rem;
}

.hero__btn:hover{
    background:#1c8ed0;
}

/* RIGHT */
.hero__right{
    width:45%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.hero__right img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* MOBILE */
@media (max-width:768px){
    .hero{
        flex-direction:column;
        justify-content:center;
        text-align:center;
    }

    .hero__left,
    .hero__right{
        width:100%;
    }

    .hero__title{
        font-size:2rem;
    }

    .navbar__menu{
        display:none;
    }
}
</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="navbar__logo">Logo</div>

    <ul class="navbar__menu">
        <li><a href="#">Home</a></li>
        <li><a href="#">Services</a></li>
        <li><a href="#">About Us</a></li>
        <li><a href="#">Contact Us</a></li>
    </ul>

    <div class="navbar__user">Username</div>
</nav>

<!-- HERO -->
<section class="hero">

    <div class="hero__left">
        <h1 class="hero__title">
            Revitalize Your<br>
            Clothes with Expert<br>
            <span>Laundry Services!</span>
        </h1>

        <p class="hero__desc">
            From premium dry cleaning to swift wash and fold, we deliver care and convenience.
            Schedule a pickup and rediscover the freshness of your clothes today!
        </p>

        <button class="hero__btn">Book a service today!</button>
    </div>

    <div class="hero__right">
        <img src="ChatGPT Image Feb 21, 2026, 10_26_16 PM.png" alt="Laundry">
    </div>

</section>

</body>
</html>
