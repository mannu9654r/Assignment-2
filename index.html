<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laundry Service</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
        }


        .navigation {
            height: 10vh;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 3vw;
            background: #eef3f7;
        }


        .logo {
            font-size: 1.6rem;
            font-weight: 700;
            color: #2c3e50;
        }

        .menu {
            display: flex;
            list-style: none;
            gap: 2vw;
        }

        .menu a {
            text-decoration: none;
            color: #6c7a89;
            font-size: 0.95rem;
        }

        .menu a:hover {
            color: #1e90ff;
        }


        .username {
            background: #dbeeff;
            padding: 8px 16px;
            border-radius: 12px;
            font-size: 0.9rem;
            color: #1e90ff;
        }


        .box {
            height: 90vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 3vw;
        }

        .header {
            width: 50%;
        }

        .head1 {
            font-size: 3rem;
            color: #2c3e50;
            line-height: 1.2;
            margin-bottom: 2vh;
        }

        .head1 span {
            color: #1e90ff;
        }

        .para {
            font-size: 1rem;
            color: #7f8c8d;
            margin-bottom: 3vh;
            line-height: 1.6;
        }

        .button {
            background: #2da9e9;
            color: white;
            padding: 14px 28px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
        }

        .button:hover {
            background: #1c8ed0;
        }

        .photo {
            width: 45%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .photo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }


        @media (max-width:768px) {
            .box {
                flex-direction: column;
                justify-content: center;
                text-align: center;
            }

            .header,
            .photo {
                width: 100%;
            }

            .head1 {
                font-size: 2rem;
            }

            .menu {
                display: none;
            }
        }
    </style>

</head>

<body>


    <nav class="navigation">
        <div class="logo">Logo</div>

        <ul class="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">About Us</a></li>
            <li><a href="#">Contact Us</a></li>
        </ul>

        <div class="username">Username</div>
    </nav>


    <section class="box">

        <div class="header">
            <h1 class="head1">
                Revitalize Your<br>
                Clothes with Expert<br>
                <span>Laundry Services!</span>
            </h1>

            <p class="para">
                From premium dry cleaning to swift wash and fold, we deliver care and convenience.
                Schedule a pickup and rediscover the freshness of your clothes today!
            </p>

            <button class="button">Book a service today!</button>
        </div>

        <div class="photo">
            <img src="image.png" alt="Laundry">
        </div>

    </section>

</body>

</html>
